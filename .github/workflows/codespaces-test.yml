name: Codespaces Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Start services
      run: docker compose up -d --build
    
    - name: Wait for services
      run: |
        echo "Waiting for backend..."
        timeout 60 bash -c 'until docker compose exec -T backend python -c "import django" 2>/dev/null; do sleep 2; done'
        echo "Backend ready!"
    
    - name: Run migrations
      run: docker compose exec -T backend python manage.py migrate
    
    - name: Create test superuser
      run: |
        docker compose exec -T backend python manage.py shell -c "
        from django.contrib.auth.models import User
        user = User.objects.create_superuser('testadmin', 'test@test.com', 'testpass123')
        user.profile.email_verified = True
        user.profile.save()
        print('Test superuser created')
        "
    
    - name: Test API endpoint
      run: |
        curl -f http://localhost:8000/api/polls/stats/ || exit 1
        echo "API is responding!"
    
    - name: Test frontend
      run: |
        curl -f http://localhost:5173 || exit 1
        echo "Frontend is responding!"
    
    - name: Run backend tests
      run: docker compose exec -T backend python manage.py test
    
    - name: Show logs on failure
      if: failure()
      run: |
        echo "=== Backend logs ==="
        docker compose logs backend
        echo "=== Frontend logs ==="
        docker compose logs frontend
    
    - name: Cleanup
      if: always()
      run: docker compose down -v
