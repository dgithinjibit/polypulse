version: '3.8'

# Docker Compose configuration for staging environment
# This extends the base docker-compose.yml with staging-specific settings

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polypulse_staging}
      POSTGRES_USER: ${POSTGRES_USER:-polypulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polypulse} -d ${POSTGRES_DB:-polypulse_staging}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_staging_data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-polypulse}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-polypulse_staging}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      PORT: 8000
      RUST_LOG: info
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_STELLAR_NETWORK=${VITE_STELLAR_NETWORK}
        - VITE_HORIZON_URL=${VITE_HORIZON_URL}
        - VITE_SOROBAN_RPC_URL=${VITE_SOROBAN_RPC_URL}
        - VITE_STELLAR_MARKET_CONTRACT_ID=${VITE_STELLAR_MARKET_CONTRACT_ID}
        - VITE_STELLAR_CHALLENGE_CONTRACT_ID=${VITE_STELLAR_CHALLENGE_CONTRACT_ID}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_staging_data:
  redis_staging_data:
